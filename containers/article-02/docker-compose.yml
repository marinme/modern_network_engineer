# One-shot wrapper for the Article 2 workbench container.
#
# Use this if you cloned the repo and want to skip remembering the cap-add
# flags. From the repo root:
#
#   docker compose -f containers/article-02/docker-compose.yml run --rm lab
#
# That builds the image if needed, drops you into a bash shell inside the
# container with the right capabilities, and removes the container on exit.
# The topology you build with `ip netns add` lives inside this one container;
# there is intentionally only one service. See containers/article-02/Dockerfile
# for the rationale.

services:
  lab:
    build: .
    image: netmod/article-02
    container_name: article-02
    hostname: workbench
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    volumes:
      # Read-only mount of the lab verification scripts so you can run
      # `./tests/test-lab-N-*.sh` from the /lab prompt after building a lab.
      # Read-only: the tests only inspect the namespaces you built.
      - ../../labs/lab-a02-topologies/tests:/lab/tests:ro
    # No published ports, no host networking. The only host volume is the
    # read-only tests directory above; everything you build is namespaced
    # inside the container.
